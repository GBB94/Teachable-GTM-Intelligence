[build]
  publish = "test_output"
  command = ""

[functions]
  directory = "netlify/functions"

# Basic auth is enforced by the edge function in netlify/edge-functions/basic-auth.js
# (the `Basic-Auth` header directive Netlify documents here is a no-op and was removed).
[[edge_functions]]
  path = "/*"
  function = "basic-auth"
